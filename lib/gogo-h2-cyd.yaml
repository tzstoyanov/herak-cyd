sensor:
  - platform: homeassistant
    entity_id: sensor.herak_gogo_h2_sht20_temperature_0
    id: t1_temp
  - platform: homeassistant
    entity_id: sensor.herak_gogo_h2_sht20_humidity_0
    id: t1_hum
  - platform: homeassistant
    entity_id: sensor.herak_gogo_h2_sht20_temperature_1
    id: t2_temp
  - platform: homeassistant
    entity_id: sensor.herak_gogo_h2_sht20_humidity_1
    id: t2_hum

# Template Button for Reset
button:
  - platform: template
    id: reset_all_btn
    on_press:
      - homeassistant.service:
          service: input_button.press
          data:
            entity_id: input_button.herak_gogo_h2_ssr_reset

# Logic to sync HA back to the Screen
interval:
  - interval: 1s
    then:
      - lvgl.label.update:
          id: temp_label
          text: !lambda |-
            return esphome::str_sprintf("T1: #ffa500 %.1f°C# H1: #00ffff %.0f%%#", id(t1_temp).state, id(t1_hum).state);
      - lvgl.label.update:
          id: temp_label_2
          text: !lambda |-
            return esphome::str_sprintf("T2: #ffa500 %.1f°C# H2: #00ffff %.0f%%#", id(t2_temp).state, id(t2_hum).state);
  - interval: 10s
    then:
      - script.execute: sw0_state_sync
      - script.execute: sw1_state_sync
      - script.execute: sw2_state_sync
      - script.execute: sw3_state_sync
      - script.execute: sw4_state_sync
      - script.execute: sw5_state_sync
      - script.execute: sw6_state_sync
      - script.execute: sw7_state_sync
